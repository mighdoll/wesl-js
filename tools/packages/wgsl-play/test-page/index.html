<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>wgsl-play test</title>
    <style>
      body { margin: 20px; background: #1a1a1a; color: #e0e0e0; font-family: sans-serif; }
      wgsl-play { width: 512px; height: 512px; display: block; margin-bottom: 20px; }
      .controls { margin-bottom: 10px; }
      button { padding: 6px 12px; margin-right: 8px; }
      select { padding: 6px; margin-right: 8px; }
      .section { margin-bottom: 30px; padding: 15px; background: #2a2a2a; border-radius: 8px; }
      h3 { margin-top: 0; }
      pre { background: #333; padding: 10px; overflow-x: auto; font-size: 12px; }
    </style>
  </head>
  <body>
    <h2>wgsl-play Dev Mode Test</h2>

    <!-- Basic test (no imports) -->
    <div class="section">
      <h3>1. Basic (no imports)</h3>
      <div class="controls">
        <button id="play1">Play</button>
        <button id="pause1">Pause</button>
      </div>
      <wgsl-play id="player1">
        @fragment fn fs_main(@builtin(position) pos: vec4f) -> @location(0) vec4f {
          let uv = pos.xy / 512.0;
          return vec4f(uv, 0.5, 1.0);
        }
      </wgsl-play>
    </div>

    <!-- Dev mode test (imports from local package) -->
    <div class="section">
      <h3>2. Dev Mode Test (imports from random_wgsl)</h3>
      <div class="controls">
        <select id="mode-select">
          <option value="npm">npm (default)</option>
          <option value="bundle">bundle (local dist/)</option>
          <option value="source">source (local shaders/)</option>
        </select>
        <button id="load-dev">Load Shader</button>
      </div>
      <wgsl-play id="player2"></wgsl-play>
      <pre id="status">Status: Ready</pre>
    </div>

    <script type="module" src="./main.ts"></script>
  </body>
</html>
