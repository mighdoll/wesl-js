<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>wgsl-play test - basics</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <h2>wgsl-play Test Page - Basics</h2>
    <nav class="test-nav"><a href="./">&larr; index</a></nav>

    <!-- Basic test (with uniforms import) -->
    <div class="section demo">
      <h3>Basic (env::u)</h3>
      <details class="source-panel">
        <summary>Show source</summary>
        <wgsl-edit id="basicSource" theme="dark">
          <script type="text/wesl">
import env::u;

@fragment fn fs_main(@builtin(position) pos: vec4f) -> @location(0) vec4f {
  let uv = pos.xy / u.resolution;
  return vec4f(uv, 0.5, 1.0);
}
          </script>
        </wgsl-edit>
      </details>
      <wgsl-play id="basicPlayer" from="basicSource"></wgsl-play>
    </div>

    <!-- conditions test (project.conditions with inline shader) -->
    <div class="section demo">
      <h3>Conditions (project.conditions)</h3>
      <p>Tests <code>conditions = { RED: true }</code> toggled via the editor</p>
      <div class="controls">
        <button type="button" id="load-red-condition">Load with RED condition</button>
      </div>
      <details class="source-panel">
        <summary>Show source</summary>
        <wgsl-edit id="conditionsSource" theme="dark">
          <script type="text/wesl">
@fragment fn fs_main() -> @location(0) vec4f {
  @if(RED) { return vec4f(1.0, 0.0, 0.0, 1.0); }
  @else { return vec4f(0.0, 1.0, 0.0, 1.0); }
}
          </script>
        </wgsl-edit>
      </details>
      <wgsl-play id="conditionsPlayer" from="conditionsSource"></wgsl-play>
      <pre id="conditions-status">Status: Ready</pre>
    </div>

    <!-- autoplay test -->
    <div class="section demo">
      <h3>autoplay="false" (starts paused)</h3>
      <details class="source-panel">
        <summary>Show source</summary>
        <wgsl-edit id="autoplaySource" theme="dark">
          <script type="text/wesl">
import env::u;

@fragment fn fs_main(@builtin(position) pos: vec4f) -> @location(0) vec4f {
  let uv = pos.xy / u.resolution;
  return vec4f(uv, sin(u.time * 10) * 0.5 + 0.5, 1.0);
}
          </script>
        </wgsl-edit>
      </details>
      <wgsl-play id="autoplayOffPlayer" from="autoplaySource" autoplay="false"></wgsl-play>
      <pre id="autoplay-status">Should start paused (time frozen at 0)</pre>
    </div>

    <script type="module" src="./Basics.ts"></script>
  </body>
</html>
